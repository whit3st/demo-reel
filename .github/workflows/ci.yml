name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/badges/coverage.json
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    name: 1. Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:ci

  lint:
    name: 2. Lint
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint:ci

  test:
    name: 3. Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm test

  build:
    name: 4. Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - format
      - lint
      - test
      - build
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.format.result }}" != "success" ]; then
            echo "CI failed at step 1: format"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "CI failed at step 2: lint"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "CI failed at step 3: test"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "CI failed at step 4: build"
            exit 1
          fi
          echo "CI passed: format, lint, test, and build completed in order"
