name: Dogfood

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm ci

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Build
        run: pnpm build

      - name: Generate demo video
        run: pnpm demo-reel demos/the-internet-login --verbose
