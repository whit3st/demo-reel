name: SBOM

on:
  push:
    branches:
      - main
    paths-ignore:
      - sbom.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Generate SBOM
        run: pnpm sbom --prod --sbom-format cyclonedx > sbom.json

      - name: Commit updated SBOM
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update sbom"
          file_pattern: sbom.json
